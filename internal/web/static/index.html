<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>initech</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#1a1a2e;color:#e0e0e0;
    font-family:'JetBrains Mono','Fira Code','Cascadia Code',Menlo,monospace}
  #app{height:100vh;overflow:hidden;display:flex;flex-direction:column}

  /* Grid container fills all available space */
  #grid{flex:1;display:grid;gap:2px;padding:2px;min-height:0}

  /* Each pane cell */
  .pane-cell{display:flex;flex-direction:column;overflow:hidden;
    border:1px solid #334;border-radius:3px;min-height:0}
  .pane-cell.focused{border-color:#5b9bd5}

  /* Pane label bar */
  .pane-label{display:flex;align-items:center;gap:6px;padding:3px 8px;
    background:#141928;cursor:pointer;flex-shrink:0;user-select:none;
    border-bottom:1px solid #334;font-size:12px;line-height:1}
  .pane-label:hover{background:#1c2340}

  /* Activity dot */
  .pane-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .pane-dot.alive{background:#2ecc71}
  .pane-dot.idle{background:#555}
  .pane-dot.dead{background:#e74c3c}

  .pane-name{color:#e0e0e0;font-weight:600;font-size:12px}
  .pane-activity{color:#7f8c8d;margin-left:auto;font-size:11px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
  .pane-bead{color:#5b9bd5;font-size:11px;margin-left:4px}

  /* Terminal container inside each cell */
  .pane-term{flex:1;overflow:hidden;min-height:0}

  /* Zoomed state: one pane fills viewport */
  #app.zoomed #grid{display:none}
  #zoom-container{display:none;flex:1;flex-direction:column;min-height:0}
  #app.zoomed #zoom-container{display:flex}
  #zoom-label{display:flex;align-items:center;gap:6px;padding:4px 10px;
    background:#141928;cursor:pointer;flex-shrink:0;user-select:none;
    border-bottom:1px solid #334;font-size:13px;line-height:1}
  #zoom-label:hover{background:#1c2340}
  #zoom-term{flex:1;overflow:hidden;min-height:0;padding:2px}

  /* Empty state */
  #empty-msg{display:none;flex:1;align-items:center;justify-content:center;
    color:#555;font-size:16px}

  /* Connection indicator */
  #conn-status{position:fixed;top:6px;right:8px;z-index:20;font-size:11px;
    padding:2px 8px;border-radius:3px;background:rgba(20,25,40,0.85)}
  #conn-status.connected{color:#2ecc71}
  #conn-status.disconnected{color:#e74c3c}
  #conn-status.connecting{color:#f39c12}

  /* Zoom hint */
  .zoom-hint{color:#555;font-size:11px;margin-left:auto}
</style>
</head>
<body>
<div id="app">
  <div id="grid"></div>
  <div id="zoom-container">
    <div id="zoom-label"></div>
    <div id="zoom-term"></div>
  </div>
  <div id="empty-msg">No agents running</div>
  <div id="conn-status">connecting</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
(function() {
  "use strict";

  var grid = document.getElementById("grid");
  var zoomContainer = document.getElementById("zoom-container");
  var zoomLabel = document.getElementById("zoom-label");
  var zoomTerm = document.getElementById("zoom-term");
  var emptyMsg = document.getElementById("empty-msg");
  var connStatus = document.getElementById("conn-status");
  var app = document.getElementById("app");

  var wsBase = location.origin.replace(/^http/, "ws");

  // Map of pane name -> { cell, term, fitAddon, ws, reconnTimer, label, dot, actSpan, beadSpan }
  var paneMap = {};
  var currentLayout = { cols: 1, rows: 1 };
  var zoomedPane = null;
  var stateWs = null;
  var stateReconnTimer = null;
  var resizeTimer = null;

  var termOptions = {
    cursorBlink: false,
    fontSize: 12,
    fontFamily: "'JetBrains Mono','Fira Code','Cascadia Code',Menlo,monospace",
    theme: {
      background: "#1a1a2e",
      foreground: "#e0e0e0",
      cursor: "#e94560",
      selectionBackground: "#264f78"
    },
    scrollback: 5000,
    convertEol: true
  };

  // Safe DOM clearing helper.
  function clearChildren(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  // --- State WebSocket ---

  function connectState() {
    if (stateWs) { stateWs.onclose = null; stateWs.close(); }
    clearTimeout(stateReconnTimer);
    setConn("connecting");

    stateWs = new WebSocket(wsBase + "/ws/state");
    stateWs.onopen = function() { setConn("connected"); };
    stateWs.onmessage = function(ev) {
      try {
        var snap = JSON.parse(ev.data);
        applyState(snap);
      } catch(e) {}
    };
    stateWs.onclose = function() {
      setConn("disconnected");
      stateReconnTimer = setTimeout(connectState, 2000);
    };
    stateWs.onerror = function() {};
  }

  function setConn(state) {
    connStatus.className = state;
    connStatus.textContent = state;
  }

  // --- Apply state snapshot ---

  function applyState(snap) {
    var layout = snap.layout || {};
    var panes = snap.panes || [];

    // Update grid template if layout changed.
    var cols = layout.cols || 1;
    var rows = layout.rows || 1;
    if (cols !== currentLayout.cols || rows !== currentLayout.rows) {
      currentLayout.cols = cols;
      currentLayout.rows = rows;
      grid.style.gridTemplateColumns = "repeat(" + cols + ", 1fr)";
      grid.style.gridTemplateRows = "repeat(" + rows + ", 1fr)";
    }

    // Build set of visible pane names in order.
    var visibleNames = [];
    var paneData = {};
    for (var i = 0; i < panes.length; i++) {
      var p = panes[i];
      if (p.visible) {
        visibleNames.push(p.name);
        paneData[p.name] = p;
      }
    }

    // Remove panes no longer visible.
    var existing = Object.keys(paneMap);
    for (var j = 0; j < existing.length; j++) {
      var eName = existing[j];
      if (visibleNames.indexOf(eName) === -1) {
        removePane(eName);
      }
    }

    // Add new panes or update existing.
    for (var k = 0; k < visibleNames.length; k++) {
      var name = visibleNames[k];
      var data = paneData[name];
      if (paneMap[name]) {
        updatePaneLabel(name, data);
      } else {
        createPane(name, data);
      }
    }

    // Reorder cells in DOM to match pane order.
    for (var m = 0; m < visibleNames.length; m++) {
      var entry = paneMap[visibleNames[m]];
      if (entry && entry.cell.parentNode === grid) {
        grid.appendChild(entry.cell);
      }
    }

    // Update focused pane highlight.
    var focused = layout.focused || "";
    for (var fn in paneMap) {
      if (paneMap.hasOwnProperty(fn)) {
        paneMap[fn].cell.classList.toggle("focused", fn === focused);
      }
    }

    // Show/hide empty message.
    var hasVisible = visibleNames.length > 0;
    emptyMsg.style.display = hasVisible ? "none" : "flex";
    grid.style.display = hasVisible ? "grid" : "none";

    // If zoomed pane was removed, exit zoom.
    if (zoomedPane && !paneMap[zoomedPane]) {
      exitZoom();
    }

    // Re-fit all visible terminals.
    fitAllTerminals();
  }

  // --- Pane lifecycle ---

  function createPane(name, data) {
    var cell = document.createElement("div");
    cell.className = "pane-cell";

    // Label bar
    var label = document.createElement("div");
    label.className = "pane-label";

    var dot = document.createElement("span");
    dot.className = "pane-dot " + dotClass(data);

    var nameSpan = document.createElement("span");
    nameSpan.className = "pane-name";
    nameSpan.textContent = name;

    var beadSpan = document.createElement("span");
    beadSpan.className = "pane-bead";
    beadSpan.textContent = data.bead_id || "";

    var actSpan = document.createElement("span");
    actSpan.className = "pane-activity";
    actSpan.textContent = data.activity || "";

    label.appendChild(dot);
    label.appendChild(nameSpan);
    label.appendChild(beadSpan);
    label.appendChild(actSpan);

    // Terminal container
    var termDiv = document.createElement("div");
    termDiv.className = "pane-term";

    cell.appendChild(label);
    cell.appendChild(termDiv);
    grid.appendChild(cell);

    // Create xterm instance
    var term = new window.Terminal(termOptions);
    var fitAddon = new window.FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(termDiv);

    var entry = {
      cell: cell,
      label: label,
      dot: dot,
      nameSpan: nameSpan,
      actSpan: actSpan,
      beadSpan: beadSpan,
      termDiv: termDiv,
      term: term,
      fitAddon: fitAddon,
      ws: null,
      reconnTimer: null
    };

    paneMap[name] = entry;

    // Click label to zoom.
    label.onclick = function() { toggleZoom(name); };

    // Connect pane WebSocket.
    connectPaneWs(name);

    // Fit after a frame so the container has its final size.
    requestAnimationFrame(function() {
      try { fitAddon.fit(); } catch(e) {}
    });
  }

  function removePane(name) {
    var entry = paneMap[name];
    if (!entry) return;

    clearTimeout(entry.reconnTimer);
    if (entry.ws) { entry.ws.onclose = null; entry.ws.close(); }
    entry.term.dispose();
    if (entry.cell.parentNode) entry.cell.parentNode.removeChild(entry.cell);

    delete paneMap[name];
  }

  function updatePaneLabel(name, data) {
    var entry = paneMap[name];
    if (!entry) return;
    entry.dot.className = "pane-dot " + dotClass(data);
    entry.actSpan.textContent = data.activity || "";
    entry.beadSpan.textContent = data.bead_id || "";
  }

  function dotClass(data) {
    if (!data.alive) return "dead";
    if (data.activity === "idle" || data.activity === "") return "idle";
    return "alive";
  }

  // --- Pane WebSocket ---

  function connectPaneWs(name) {
    var entry = paneMap[name];
    if (!entry) return;

    if (entry.ws) { entry.ws.onclose = null; entry.ws.close(); }
    clearTimeout(entry.reconnTimer);

    var url = wsBase + "/ws/pane/" + encodeURIComponent(name);
    var ws = new WebSocket(url);
    ws.binaryType = "arraybuffer";
    entry.ws = ws;

    ws.onmessage = function(ev) {
      if (!entry.term) return;
      if (ev.data instanceof ArrayBuffer) {
        entry.term.write(new Uint8Array(ev.data));
      } else {
        entry.term.write(ev.data);
      }
    };

    ws.onclose = function() {
      entry.reconnTimer = setTimeout(function() {
        if (paneMap[name]) connectPaneWs(name);
      }, 2000);
    };

    ws.onerror = function() {};
  }

  // --- Zoom ---

  function toggleZoom(name) {
    if (zoomedPane === name) {
      exitZoom();
    } else {
      enterZoom(name);
    }
  }

  function enterZoom(name) {
    var entry = paneMap[name];
    if (!entry) return;

    zoomedPane = name;
    app.classList.add("zoomed");

    // Move terminal DOM into zoom container.
    clearChildren(zoomTerm);
    zoomTerm.appendChild(entry.termDiv);

    // Build zoom label.
    clearChildren(zoomLabel);
    var dot = document.createElement("span");
    dot.className = entry.dot.className;
    var nameSpan = document.createElement("span");
    nameSpan.className = "pane-name";
    nameSpan.textContent = name;
    var hint = document.createElement("span");
    hint.className = "zoom-hint";
    hint.textContent = "click or Esc to return";
    zoomLabel.appendChild(dot);
    zoomLabel.appendChild(nameSpan);
    zoomLabel.appendChild(hint);
    zoomLabel.onclick = function() { exitZoom(); };

    // Re-fit to new (larger) container.
    requestAnimationFrame(function() {
      try { entry.fitAddon.fit(); } catch(e) {}
    });
  }

  function exitZoom() {
    if (!zoomedPane) return;
    var entry = paneMap[zoomedPane];

    app.classList.remove("zoomed");
    zoomedPane = null;

    // Move terminal DOM back to its grid cell.
    if (entry) {
      entry.cell.appendChild(entry.termDiv);
      requestAnimationFrame(function() {
        try { entry.fitAddon.fit(); } catch(e) {}
      });
    }

    zoomLabel.onclick = null;
    clearChildren(zoomTerm);
    clearChildren(zoomLabel);
  }

  // Esc exits zoom.
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && zoomedPane) {
      e.preventDefault();
      exitZoom();
    }
  });

  // --- Fit all terminals (debounced on resize) ---

  function fitAllTerminals() {
    for (var name in paneMap) {
      if (paneMap.hasOwnProperty(name)) {
        try { paneMap[name].fitAddon.fit(); } catch(e) {}
      }
    }
  }

  window.addEventListener("resize", function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(fitAllTerminals, 100);
  });

  // --- Boot ---

  connectState();
})();
</script>
</body>
</html>
