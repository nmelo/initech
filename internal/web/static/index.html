<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>initech</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#1a1a2e;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif}
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* Tab bar */
  #tab-bar{display:flex;align-items:center;background:#16213e;border-bottom:1px solid #0f3460;
    overflow-x:auto;flex-shrink:0;height:38px;padding:0 8px;gap:2px}
  #tab-bar::-webkit-scrollbar{height:0}
  .tab{padding:6px 14px;border:none;background:transparent;color:#7f8c8d;cursor:pointer;
    font-size:13px;font-family:inherit;border-bottom:2px solid transparent;
    white-space:nowrap;transition:color .15s,border-color .15s}
  .tab:hover{color:#e0e0e0}
  .tab.active{color:#e0e0e0;border-bottom-color:#e94560}
  .tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;
    vertical-align:middle}
  .tab .dot.alive{background:#2ecc71}
  .tab .dot.dead{background:#555}
  .conn-badge{margin-left:auto;padding:0 10px;font-size:11px;flex-shrink:0}
  .conn-badge.connected{color:#2ecc71}
  .conn-badge.disconnected{color:#e74c3c}
  .conn-badge.connecting{color:#f39c12}

  /* Terminal fills remaining space */
  #terminal-container{flex:1;overflow:hidden;padding:4px}

  /* Empty state */
  #empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:#555;font-size:15px}
</style>
</head>
<body>
<div id="app">
  <div id="tab-bar"></div>
  <div id="terminal-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
(function() {
  "use strict";

  var tabBar = document.getElementById("tab-bar");
  var termContainer = document.getElementById("terminal-container");
  var activeName = null;
  var term = null;
  var fitAddon = null;
  var ws = null;
  var reconnectTimer = null;

  var wsBase = location.origin.replace(/^http/, "ws");

  function fetchPanes() {
    fetch("/api/panes")
      .then(function(r) { return r.ok ? r.json() : []; })
      .then(renderTabs)
      .catch(function() {});
  }

  function renderTabs(panes) {
    tabBar.innerHTML = "";
    panes.forEach(function(p) {
      var btn = document.createElement("button");
      btn.className = "tab" + (p.name === activeName ? " active" : "");
      btn.innerHTML = '<span class="dot ' + (p.alive ? "alive" : "dead") + '"></span>' +
        escapeHtml(p.name);
      btn.onclick = function() { selectPane(p.name); };
      tabBar.appendChild(btn);
    });
    // Connection status badge at the right end.
    if (activeName) {
      var badge = document.createElement("span");
      badge.id = "conn-status";
      badge.className = "conn-badge " + (ws && ws.readyState === WebSocket.OPEN ? "connected" : "connecting");
      badge.textContent = ws && ws.readyState === WebSocket.OPEN ? "connected" : "connecting";
      tabBar.appendChild(badge);
    }
    if (!activeName && panes.length > 0) selectPane(panes[0].name);
  }

  function selectPane(name) {
    if (name === activeName) return;
    activeName = name;
    cleanup();

    // Highlight active tab.
    var tabs = tabBar.querySelectorAll(".tab");
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].className = tabs[i].textContent.trim() === name ? "tab active" : "tab";
    }

    initTerminal();
    connectWs(name);
  }

  function initTerminal() {
    term = new window.Terminal({
      cursorBlink: true,
      fontSize: 13,
      fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace",
      theme: {
        background: "#1a1a2e",
        foreground: "#e0e0e0",
        cursor: "#e94560",
        selectionBackground: "#264f78"
      },
      scrollback: 5000,
      convertEol: true
    });
    fitAddon = new window.FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(termContainer);
    fitAddon.fit();
  }

  function connectWs(name) {
    if (ws) { ws.onclose = null; ws.close(); }
    clearTimeout(reconnectTimer);

    var url = wsBase + "/ws/pane/" + encodeURIComponent(name);
    ws = new WebSocket(url);
    ws.binaryType = "arraybuffer";

    ws.onopen = function() {
      setConnStatus("connected", "connected");
    };

    ws.onmessage = function(ev) {
      if (!term) return;
      if (ev.data instanceof ArrayBuffer) {
        term.write(new Uint8Array(ev.data));
      } else {
        term.write(ev.data);
      }
    };

    ws.onclose = function() {
      setConnStatus("disconnected", "disconnected");
      reconnectTimer = setTimeout(function() {
        if (activeName === name) connectWs(name);
      }, 2000);
    };

    ws.onerror = function() {};
  }

  function setConnStatus(cls, text) {
    var el = document.getElementById("conn-status");
    if (el) {
      el.className = "conn-badge " + cls;
      el.textContent = text;
    }
  }

  function cleanup() {
    clearTimeout(reconnectTimer);
    if (ws) { ws.onclose = null; ws.close(); ws = null; }
    if (term) { term.dispose(); term = null; fitAddon = null; }
  }

  function escapeHtml(s) {
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  window.addEventListener("resize", function() {
    if (fitAddon) fitAddon.fit();
  });

  fetchPanes();
  setInterval(fetchPanes, 3000);
})();
</script>
</body>
</html>
