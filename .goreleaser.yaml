version: 2

project_name: initech

changelog:
  sort: asc
  filters:
    exclude:
      - '^qa:'
      - '^docs:'
      - '^test:'
      - '^Merge'
  groups:
    - title: Features
      regexp: '^feat'
    - title: Bug Fixes
      regexp: '^fix'
    - title: Other
      order: 999

builds:
  - binary: initech
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/nmelo/initech/cmd.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: nmelo
    name: initech
  draft: false
  prerelease: auto

brews:
  - repository:
      owner: nmelo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/nmelo/initech
    description: Bootstrap and manage multi-agent development projects
    license: MIT
    install: |
      bin.install "initech"
    test: |
      system "#{bin}/initech", "version"
