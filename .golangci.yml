version: "2"

formatters:
  enable:
    - goimports

linters:
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - staticcheck
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*github.com/gdamore/tcell/v2.Screen).SetContent
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

issues:
  exclude-dirs:
    - vendor
