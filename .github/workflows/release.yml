name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and archive artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --split --clean

      - name: Archive dist
        run: tar czf dist.tar.gz dist/

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist.tar.gz

  release:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Extract dist
        run: tar xzf dist.tar.gz

      - name: Publish release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Add AI changelog summary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, skipping AI summary"
            exit 0
          fi

          COMMITS=$(git log --oneline "${PREV_TAG}..HEAD")
          if [ -z "$COMMITS" ]; then
            echo "No commits since ${PREV_TAG}, skipping AI summary"
            exit 0
          fi

          SUMMARY=$(curl -sf https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "content-type: application/json" \
            -d "$(jq -n --arg commits "$COMMITS" '{
              model: "gpt-4o-mini",
              max_tokens: 256,
              messages: [{
                role: "user",
                content: ("Summarize these commits into a 2-3 sentence changelog blurb for a GitHub release. Be concise and focus on what changed for users, not implementation details.\n\nCommits:\n" + $commits)
              }]
            }')" 2>/dev/null | jq -r '.choices[0].message.content // empty') || SUMMARY=""

          if [ -z "$SUMMARY" ]; then
            echo "AI summary unavailable, skipping"
            exit 0
          fi

          EXISTING=$(gh release view "$TAG" --repo nmelo/initech --json body --jq '.body')
          gh release edit "$TAG" --repo nmelo/initech --notes "$(printf '%s\n\n---\n\n%s' "$SUMMARY" "$EXISTING")"
